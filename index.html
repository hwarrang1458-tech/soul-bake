<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        (function() {
// Scope everything to a IIFE to avoid global namespace pollution
(function() {
    'use strict';

    const PRODUCTS = [
        { id: 1, name: "Crinkle Cookies", price: 85, cat: "Pastries", emoji: "🍪" },
        { id: 2, name: "Butter Croissant", price: 95, cat: "Pastries", emoji: "🥐" },
        { id: 3, name: "Artisan Loaf", price: 120, cat: "Breads", emoji: "🍞" },
        { id: 4, name: "Custom Cake", price: 650, cat: "Cakes", emoji: "🎂" },
        { id: 5, name: "Chocolate Muffin", price: 80, cat: "Pastries", emoji: "🧁" },
        { id: 6, name: "Iced Latte", price: 110, cat: "Drinks", emoji: "☕" }
    ];

    const BRANCHES = [
        { name: "Tumaga Branch", addr: "Veterans Ave Ext, Zamboanga", coords: [6.9328, 122.0785], open: 10, close: 22 },
        { name: "Veterans Branch", addr: "Veterans Avenue, Zamboanga", coords: [6.9185, 122.0742], open: 9, close: 18 }
    ];

    let cart = JSON.parse(localStorage.getItem('soul_bake_cart')) || {};

    const dom = {
        productGrid: document.getElementById('productGrid'),
        branchGrid: document.getElementById('branchGrid'),
        cartItems: document.getElementById('cartItems'),
        cartBadge: document.getElementById('cartBadge'),
        cartTotal: document.getElementById('cartTotal'),
        formItems: document.getElementById('formItems'),
        formTotal: document.getElementById('formTotal'),
        orderForm: document.getElementById('orderForm'),
        toast: document.getElementById('toast')
    };

    function init() {
        if (typeof lucide !== 'undefined') lucide.createIcons();
        initMap();
        renderMenu('All');
        renderBranches();
        updateCart();
        attachEventListeners();
    }

    function initMap() {
        const map = L.map('map').setView([6.9250, 122.0760], 14);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap'
        }).addTo(map);

        BRANCHES.forEach(loc => {
            L.marker(loc.coords).addTo(map).bindPopup(`<b>${loc.name}</b><br>${loc.addr}`);
        });
    }

    window.addToCart = function(id) { // Exposed to HTML
        const p = PRODUCTS.find(x => x.id === id);
        if (cart[id]) cart[id].qty++;
        else cart[id] = { ...p, qty: 1 };
        saveAndUpdate();
        showToast(`Added ${p.name}`);
    };

    window.changeQty = function(id, delta) { // Exposed to HTML
        if (!cart[id]) return;
        cart[id].qty += delta;
        if (cart[id].qty <= 0) delete cart[id];
        saveAndUpdate();
    };

    function saveAndUpdate() {
        localStorage.setItem('soul_bake_cart', JSON.stringify(cart));
        updateCart();
    }

    function updateCart() {
        let html = '';
        let total = 0;
        let count = 0;

        Object.values(cart).forEach(item => {
            html += `
                <div class="cart-item">
                    <div class="cart-item-emoji">${item.emoji}</div>
                    <div style="flex:1">
                        <p style="font-weight:700; font-size:0.9rem;">${item.name}</p>
                        <p style="font-size:0.8rem;">₱${item.price.toFixed(2)}</p>
                        <div style="display:flex; align-items:center; gap:10px; margin-top:5px;">
                            <button class="qty-btn" onclick="changeQty(${item.id}, -1)">-</button>
                            <span>${item.qty}</span>
                            <button class="qty-btn" onclick="changeQty(${item.id}, 1)">+</button>
                        </div>
                    </div>
                </div>`;
            total += item.price * item.qty;
            count += item.qty;
        });

        dom.cartItems.innerHTML = html || '<p style="text-align:center; opacity:0.5;">Bag is empty 🥐</p>';
        dom.cartBadge.innerText = count;
        dom.cartBadge.style.display = count > 0 ? 'flex' : 'none';
        dom.cartTotal.innerText = `₱${total.toFixed(2)}`;
        
        // Update hidden fields for Formspree
        dom.formItems.value = Object.values(cart).map(i => `${i.name} (x${i.qty})`).join('\n');
        dom.formTotal.value = `₱${total.toFixed(2)}`;
    }

    function showToast(msg) {
        dom.toast.innerText = msg;
        dom.toast.style.display = 'block';
        setTimeout(() => dom.toast.style.display = 'none', 3000);
    }

    function attachEventListeners() {
        dom.orderForm.onsubmit = (e) => {
            if (Object.keys(cart).length === 0) {
                e.preventDefault();
                showToast("Cart is empty!");
            }
            // Logic to clear cart after successful submit could go here 
            // (Note: Formspree redirects, so cart clears on next load anyway)
        };
    }

    window.onload = init;
})();
        })(); // Make sure this closing bracket and semicolon are here!
    </script>
</body>
</html>
