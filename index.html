<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Soul Bake. Zamboanga | Premium Breads, Cakes & Pastries</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,600;1,600&family=Lato:wght@300;400;700&family=Playfair+Display:ital,wght@0,700;1,700&display=swap" rel="stylesheet">
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        :root {
            --primary-cream: #FAF3E0;
            --warm-brown: #3B1F0C;
            --accent-caramel: #C8843A;
            --deep-espresso: #2C1503;
            --off-white: #FFFDF8;
            --muted-blush: #F5E6D3;
            --text-gray: #5C4033;
            --star-gold: #F4B942;
            --nav-height: 80px;
            --transition: all 0.5s cubic-bezier(0.19, 1, 0.22, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-font-smoothing: antialiased; }
        html { scroll-behavior: smooth; }
        body { font-family: 'Lato', sans-serif; background-color: var(--off-white); color: var(--text-gray); line-height: 1.6; overflow-x: hidden; }

        h1, h2, h3, h4 { font-family: 'Playfair Display', serif; color: var(--warm-brown); font-weight: 700; }
        .label { font-family: 'Cormorant Garamond', serif; font-variant: small-caps; letter-spacing: 0.15em; color: var(--accent-caramel); font-weight: 600; display: block; margin-bottom: 1rem; font-size: 0.9rem; }
        .container { max-width: 1200px; margin: 0 auto; padding: 0 5%; }

        /* Navigation */
        nav { position: fixed; top: 0; left: 0; width: 100%; height: var(--nav-height); z-index: 1000; display: flex; align-items: center; transition: var(--transition); background: var(--primary-cream); border-bottom: 1px solid rgba(0,0,0,0.05); }
        nav.scrolled { height: 70px; box-shadow: 0 4px 20px rgba(0,0,0,0.05); }
        nav .container { display: flex; justify-content: space-between; align-items: center; width: 100%; }
        .logo { text-decoration: none; color: var(--warm-brown); }
        .logo h1 { font-size: 1.5rem; }
        .logo span { color: var(--accent-caramel); }
        .nav-links { display: flex; gap: 30px; }
        .nav-links a { text-decoration: none; color: var(--warm-brown); font-size: 0.85rem; font-weight: 700; }
        
        .cart-trigger { position: relative; background: none; border: none; cursor: pointer; color: var(--warm-brown); }
        .cart-count { position: absolute; top: -8px; right: -10px; background: #E63946; color: white; font-size: 10px; width: 18px; height: 18px; border-radius: 50%; display: none; align-items: center; justify-content: center; font-weight: 700; }

        /* Buttons */
        .btn { display: inline-flex; align-items: center; justify-content: center; padding: 14px 28px; text-decoration: none; font-weight: 700; text-transform: uppercase; font-size: 0.75rem; transition: var(--transition); cursor: pointer; border: none; letter-spacing: 1px; }
        .btn-espresso { background: var(--deep-espresso); color: white; }
        .btn-espresso:hover { background: var(--accent-caramel); transform: translateY(-2px); }

        /* Hero */
        #hero { min-height: 100vh; background: var(--primary-cream); display: flex; align-items: center; padding-top: var(--nav-height); }
        .hero-grid { display: grid; grid-template-columns: 1.1fr 0.9fr; gap: 40px; align-items: center; width: 100%; }
        .hero-text h2 { font-size: clamp(2.5rem, 6vw, 5rem); font-style: italic; line-height: 1.1; margin-bottom: 1.5rem; }
        .badge-wrapper { position: relative; width: 140px; height: 140px; cursor: pointer; margin-top: 2rem; }
        .badge-svg { width: 100%; height: 100%; animation: rotate 12s linear infinite; }
        .badge-svg text { fill: var(--warm-brown); font-family: 'Cormorant Garamond'; font-size: 12px; letter-spacing: 3px; text-transform: uppercase; }
        .badge-center { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 50px; height: 50px; background: var(--deep-espresso); color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; }
        .hero-visual { width: 100%; aspect-ratio: 1; background: radial-gradient(circle, #8B5E3C, #3B1F0C); display: flex; flex-direction: column; align-items: center; justify-content: center; color: white; box-shadow: 20px 20px 60px rgba(0,0,0,0.1); }
        .hero-visual span { font-size: 7rem; }

        /* Menu */
        #menu { padding: 100px 0; }
        .tabs { display: flex; justify-content: center; gap: 10px; margin-bottom: 40px; flex-wrap: wrap; }
        .tab-btn { padding: 10px 20px; border-radius: 50px; border: 1px solid var(--muted-blush); background: white; cursor: pointer; font-size: 0.8rem; font-weight: 700; transition: 0.3s; }
        .tab-btn.active { background: var(--accent-caramel); color: white; border-color: var(--accent-caramel); }
        .product-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 25px; }
        .product-card { background: white; padding: 25px; border: 1px solid transparent; transition: var(--transition); text-align: center; }
        .product-card:hover { border-color: var(--muted-blush); transform: translateY(-5px); box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        .product-card .emoji { font-size: 4rem; background: var(--primary-cream); aspect-ratio: 1; display: flex; align-items: center; justify-content: center; margin-bottom: 15px; }

        /* Cart Drawer */
        .cart-drawer { position: fixed; top: 0; right: 0; width: min(400px, 100%); height: 100%; background: var(--off-white); z-index: 2000; transform: translateX(100%); transition: 0.5s cubic-bezier(0.19, 1, 0.22, 1); display: flex; flex-direction: column; box-shadow: -10px 0 40px rgba(0,0,0,0.1); }
        .cart-drawer.active { transform: translateX(0); }
        .drawer-header { padding: 25px; border-bottom: 1px solid var(--muted-blush); display: flex; justify-content: space-between; align-items: center; }
        .drawer-content { flex: 1; padding: 25px; overflow-y: auto; }
        .cart-item { display: flex; gap: 15px; margin-bottom: 20px; align-items: center; border-bottom: 1px solid var(--muted-blush); padding-bottom: 15px; }
        .cart-item-emoji { font-size: 2rem; background: var(--primary-cream); width: 50px; height: 50px; display: flex; align-items: center; justify-content: center; }
        .qty-btn { background: var(--muted-blush); border: none; width: 25px; height: 25px; cursor: pointer; font-weight: 700; }

        /* Modal */
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); backdrop-filter: blur(4px); z-index: 3000; display: none; align-items: center; justify-content: center; padding: 20px; }
        .modal-overlay.active { display: flex; }
        .modal { background: var(--off-white); width: 100%; max-width: 550px; padding: 40px; position: relative; max-height: 90vh; overflow-y: auto; }
        .close-modal { position: absolute; top: 20px; right: 20px; cursor: pointer; background: none; border: none; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; font-size: 0.75rem; font-weight: 700; text-transform: uppercase; margin-bottom: 5px; }
